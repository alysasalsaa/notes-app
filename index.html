<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes App</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0f172a;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #f8fafc;
      display: flex;
      flex-direction: column;
    }

    /* Top bar */
    .topbar {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 0.85rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .topbar h1 { font-size: 1.2rem; font-weight: 700; }

    .topbar-right { display: flex; gap: 8px; align-items: center; }

    .search-input {
      background: #0f172a;
      border: 1.5px solid #334155;
      border-radius: 8px;
      color: #f8fafc;
      font-size: 0.85rem;
      padding: 0.4rem 0.75rem;
      outline: none;
      font-family: inherit;
      width: 200px;
      transition: border-color 0.15s;
    }
    .search-input:focus { border-color: #6366f1; }

    .btn-new {
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.45rem 1rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .btn-new:hover { opacity: 0.88; }

    /* Layout */
    .layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      flex: 1;
      height: calc(100vh - 56px);
      overflow: hidden;
    }

    @media (max-width: 640px) {
      .layout { grid-template-columns: 1fr; height: auto; }
      .editor-pane { display: none; }
      .editor-pane.active { display: flex; }
    }

    /* Sidebar */
    .sidebar {
      border-right: 1px solid #334155;
      overflow-y: auto;
      background: #1a2540;
      display: flex;
      flex-direction: column;
    }

    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

    .sidebar-empty {
      padding: 2rem 1rem;
      text-align: center;
      color: #475569;
      font-size: 0.8rem;
    }

    .note-item {
      padding: 0.85rem 1rem;
      border-bottom: 1px solid #1e293b;
      cursor: pointer;
      transition: background 0.12s;
      position: relative;
    }
    .note-item:hover { background: #273549; }
    .note-item.active { background: #312e81; border-left: 3px solid #6366f1; padding-left: calc(1rem - 3px); }

    .note-item-title {
      font-size: 0.875rem;
      font-weight: 600;
      color: #e2e8f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-right: 24px;
    }

    .note-item-preview {
      font-size: 0.72rem;
      color: #64748b;
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .note-item-date {
      font-size: 0.65rem;
      color: #475569;
      margin-top: 4px;
    }

    .note-item-del {
      position: absolute;
      top: 8px; right: 8px;
      background: none;
      border: none;
      color: #475569;
      font-size: 0.85rem;
      cursor: pointer;
      padding: 2px 5px;
      border-radius: 4px;
      transition: background 0.1s, color 0.1s;
      line-height: 1;
    }
    .note-item-del:hover { background: #450a0a; color: #fca5a5; }

    /* Editor pane */
    .editor-pane {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .editor-toolbar {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 0.6rem 1rem;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .note-title-input {
      flex: 1;
      background: transparent;
      border: none;
      color: #f8fafc;
      font-size: 1rem;
      font-weight: 600;
      outline: none;
      font-family: inherit;
      min-width: 120px;
    }
    .note-title-input::placeholder { color: #475569; }

    .toolbar-right { display: flex; gap: 6px; margin-left: auto; }

    .tb-btn {
      background: transparent;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #94a3b8;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.3rem 0.65rem;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.1s, color 0.1s;
      white-space: nowrap;
    }
    .tb-btn:hover  { background: #273549; color: #f8fafc; }
    .tb-btn.active { background: #312e81; border-color: #6366f1; color: #a5b4fc; }
    .tb-btn.save   { background: #6366f1; border-color: #6366f1; color: #fff; }
    .tb-btn.save:hover { opacity: 0.88; }

    /* Editor / preview */
    .editor-body {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr;
      overflow: hidden;
    }

    .editor-body.split { grid-template-columns: 1fr 1fr; }

    textarea.md-editor {
      background: #0f172a;
      border: none;
      border-right: 1px solid #334155;
      color: #e2e8f0;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      padding: 1.25rem;
      resize: none;
      outline: none;
      line-height: 1.7;
      overflow-y: auto;
    }

    .md-preview {
      background: #0f172a;
      padding: 1.25rem 1.5rem;
      overflow-y: auto;
      line-height: 1.75;
      font-size: 0.9rem;
      color: #cbd5e1;
      display: none;
    }

    .editor-body.split .md-preview { display: block; }
    .editor-body.preview-only textarea { display: none; }
    .editor-body.preview-only .md-preview { display: block; }

    /* Markdown preview styles */
    .md-preview h1,.md-preview h2,.md-preview h3 { color: #f8fafc; margin: 1rem 0 0.5rem; }
    .md-preview h1 { font-size: 1.5rem; }
    .md-preview h2 { font-size: 1.2rem; }
    .md-preview h3 { font-size: 1rem; }
    .md-preview p  { margin-bottom: 0.75rem; }
    .md-preview ul,.md-preview ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
    .md-preview li { margin-bottom: 0.25rem; }
    .md-preview code { background: #1e293b; padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 0.85em; color: #a5b4fc; }
    .md-preview pre  { background: #1e293b; padding: 1rem; border-radius: 8px; overflow-x: auto; margin-bottom: 0.75rem; }
    .md-preview pre code { background: none; padding: 0; }
    .md-preview blockquote { border-left: 3px solid #6366f1; padding-left: 1rem; color: #94a3b8; margin-bottom: 0.75rem; }
    .md-preview a { color: #818cf8; }
    .md-preview strong { color: #f8fafc; }
    .md-preview hr { border: none; border-top: 1px solid #334155; margin: 1rem 0; }
    .md-preview table { width: 100%; border-collapse: collapse; margin-bottom: 0.75rem; }
    .md-preview th,.md-preview td { border: 1px solid #334155; padding: 0.4rem 0.75rem; }
    .md-preview th { background: #1e293b; }

    /* No note selected */
    .no-note {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #334155;
      font-size: 0.9rem;
      flex-direction: column;
      gap: 0.5rem;
    }
    .no-note .icon { font-size: 2.5rem; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: #052e16;
      border: 1px solid #22c55e;
      color: #86efac;
      padding: 0.6rem 1rem;
      border-radius: 10px;
      font-size: 0.8rem;
      font-weight: 600;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 999;
    }
    .toast.show { opacity: 1; transform: none; }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div class="topbar">
    <h1>📝 Notes</h1>
    <div class="topbar-right">
      <input class="search-input" type="text" id="search" placeholder="Search notes..." oninput="renderSidebar()" />
      <button class="btn-new" onclick="newNote()">+ New Note</button>
    </div>
  </div>

  <div class="layout">

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar"></div>

    <!-- Editor pane -->
    <div class="editor-pane" id="editor-pane">
      <div class="no-note" id="no-note">
        <div class="icon">📄</div>
        <span>Select a note or create a new one</span>
      </div>

      <div id="editor-container" style="display:none; flex-direction:column; flex:1; overflow:hidden;">
        <div class="editor-toolbar">
          <input class="note-title-input" type="text" id="note-title" placeholder="Note title..." oninput="autoSave()" />
          <div class="toolbar-right">
            <button class="tb-btn" id="btn-split"   onclick="setMode('split')">Split</button>
            <button class="tb-btn" id="btn-preview" onclick="setMode('preview')">Preview</button>
            <button class="tb-btn" id="btn-edit"    onclick="setMode('edit')">Edit</button>
            <button class="tb-btn save" onclick="saveNote()">Save</button>
          </div>
        </div>

        <div class="editor-body" id="editor-body">
          <textarea class="md-editor" id="md-editor" placeholder="Write your note in Markdown...&#10;&#10;# Heading&#10;**bold**, _italic_, `code`" oninput="autoSave(); updatePreview()"></textarea>
          <div class="md-preview" id="md-preview"></div>
        </div>
      </div>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script>
    const STORAGE_KEY = 'notes_app_v1';
    let notes = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    let activeId = null;
    let autoSaveTimer = null;
    let viewMode = 'edit'; // 'edit' | 'split' | 'preview'

    /* ── Helpers ── */
    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(notes)); }

    function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

    function formatDate(ts) {
      return new Date(ts).toLocaleString('en-GB', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 1800);
    }

    function stripMd(text) {
      return text.replace(/[#*_`>\[\]!]/g, '').replace(/\n/g, ' ').trim();
    }

    /* ── Render sidebar ── */
    function renderSidebar() {
      const sidebar = document.getElementById('sidebar');
      const query   = document.getElementById('search').value.toLowerCase();

      let filtered = notes.filter(n =>
        n.title.toLowerCase().includes(query) ||
        n.content.toLowerCase().includes(query)
      );

      // Sort newest first
      filtered = [...filtered].sort((a, b) => b.updatedAt - a.updatedAt);

      if (filtered.length === 0) {
        sidebar.innerHTML = `<div class="sidebar-empty">${query ? 'No notes match your search.' : 'No notes yet. Click + New Note.'}</div>`;
        return;
      }

      sidebar.innerHTML = '';
      filtered.forEach(note => {
        const item = document.createElement('div');
        item.className = 'note-item' + (note.id === activeId ? ' active' : '');
        item.dataset.id = note.id;
        item.innerHTML = `
          <div class="note-item-title">${note.title || 'Untitled'}</div>
          <div class="note-item-preview">${stripMd(note.content).slice(0, 60) || 'No content'}</div>
          <div class="note-item-date">${formatDate(note.updatedAt)}</div>
          <button class="note-item-del" title="Delete" onclick="deleteNote('${note.id}', event)">✕</button>
        `;
        item.addEventListener('click', () => openNote(note.id));
        sidebar.appendChild(item);
      });
    }

    /* ── Open note ── */
    function openNote(id) {
      activeId = id;
      const note = notes.find(n => n.id === id);
      if (!note) return;

      document.getElementById('no-note').style.display = 'none';
      const container = document.getElementById('editor-container');
      container.style.display = 'flex';

      document.getElementById('note-title').value = note.title;
      document.getElementById('md-editor').value  = note.content;
      updatePreview();
      renderSidebar();
      setMode(viewMode);
    }

    /* ── New note ── */
    function newNote() {
      const note = {
        id: genId(),
        title: '',
        content: '',
        createdAt: Date.now(),
        updatedAt: Date.now(),
      };
      notes.unshift(note);
      save();
      openNote(note.id);
    }

    /* ── Save note ── */
    function saveNote() {
      if (!activeId) return;
      const note = notes.find(n => n.id === activeId);
      if (!note) return;
      note.title     = document.getElementById('note-title').value.trim() || 'Untitled';
      note.content   = document.getElementById('md-editor').value;
      note.updatedAt = Date.now();
      save();
      renderSidebar();
      showToast('✓ Note saved');
    }

    /* ── Auto save ── */
    function autoSave() {
      clearTimeout(autoSaveTimer);
      autoSaveTimer = setTimeout(saveNote, 1000);
    }

    /* ── Delete note ── */
    function deleteNote(id, e) {
      e.stopPropagation();
      if (!confirm('Delete this note?')) return;
      notes = notes.filter(n => n.id !== id);
      save();
      if (activeId === id) {
        activeId = null;
        document.getElementById('no-note').style.display = 'flex';
        document.getElementById('editor-container').style.display = 'none';
      }
      renderSidebar();
      showToast('Note deleted');
    }

    /* ── Markdown preview ── */
    function updatePreview() {
      const content = document.getElementById('md-editor').value;
      document.getElementById('md-preview').innerHTML = marked.parse(content);
    }

    /* ── View mode ── */
    function setMode(mode) {
      viewMode = mode;
      const body = document.getElementById('editor-body');
      body.className = 'editor-body';
      if (mode === 'split')   body.classList.add('split');
      if (mode === 'preview') body.classList.add('preview-only');

      document.getElementById('btn-edit').classList.toggle('active', mode === 'edit');
      document.getElementById('btn-split').classList.toggle('active', mode === 'split');
      document.getElementById('btn-preview').classList.toggle('active', mode === 'preview');

      if (mode !== 'edit') updatePreview();
    }

    /* ── Init ── */
    renderSidebar();
  </script>
</body>
</html>
